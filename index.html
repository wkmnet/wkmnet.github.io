<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo</title>
  <!-- 请勿在项目正式环境中引用该 layui.css 地址 -->
  <link href="//unpkg.com/layui@2.13.7/dist/css/layui.css" rel="stylesheet">
  <link rel="icon" href="/dist/icon.ico" type="image/x-icon" />
</head>
<body>
 <div>
 <audio controls>
	 <source src="/audio/syrbxcq.mp3" type="audio/mpeg">
</audio>
 </div>
<div class="layui-carousel" id="ID-carousel-demo-image">
  <div carousel-item>
    <div><img src="/images/01.jpg" width="1324" height="1024"></div>
    <div><img src="/images/02.jpg" width="1324" height="1024"></div>
    <div><img src="/images/03.jpg" width="1324" height="1024"></div>
    <div><img src="/images/04.jpg" width="1324" height="1024"></div>
    <div><img src="/images/05.jpg" width="1324" height="1024"></div>
    <div><img src="/images/06.jpg" width="1324" height="1024"></div>
    <div><img src="/images/07.jpg" width="1324" height="1024"></div>
    <div><img src="/images/08.jpg" width="1324" height="1024"></div>
    <div><img src="/images/09.jpg" width="1324" height="1024"></div>
  </div>
</div>
  
<!-- 请勿在项目正式环境中引用该 layui.js 地址 -->
<script src="//unpkg.com/layui@2.13.7/dist/layui.js"></script>
<script>
layui.use(function(){
  var carousel = layui.carousel;
  // 渲染 - 图片轮播
  carousel.render({
    elem: '#ID-carousel-demo-image',
    width: '1324px',
    height: '1024px',
    anim: 'fade',
    interval: 2000
  });
});
</script>
 
</body>
</html>
